<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 300px;
      background: #0c0f1c;
      color: #fff;
      font-family: -apple-system, sans-serif;
      padding: 16px;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .title {
      font-size: 15px;
      font-weight: 700;
      background: linear-gradient(135deg, #f97316, #818cf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .mock-toggle {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: rgba(255,255,255,0.4);
    }
    .toggle {
      width: 32px;
      height: 18px;
      border-radius: 9px;
      background: rgba(255,255,255,0.1);
      border: none;
      cursor: pointer;
      position: relative;
      transition: background 0.2s;
    }
    .toggle.on { background: #f97316; }
    .toggle::after {
      content: '';
      position: absolute;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #fff;
      top: 2px;
      left: 2px;
      transition: transform 0.2s;
    }
    .toggle.on::after { transform: translateX(14px); }

    .section-title {
      font-size: 10px;
      color: rgba(255,255,255,0.3);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 8px;
    }
    .bars { margin-bottom: 16px; }
    .bar-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }
    .bar-label { font-size: 11px; color: rgba(255,255,255,0.5); width: 60px; flex-shrink: 0; }
    .bar-track {
      flex: 1;
      height: 6px;
      background: rgba(255,255,255,0.08);
      border-radius: 3px;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.4s ease;
    }
    .bar-value { font-size: 10px; color: rgba(255,255,255,0.3); width: 28px; text-align: right; flex-shrink: 0; }

    .divider { height: 1px; background: rgba(255,255,255,0.06); margin: 12px 0; }

    .reasoning-box {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 10px;
      padding: 8px 10px;
      margin-bottom: 12px;
      min-height: 32px;
    }
    .reasoning-label {
      font-size: 9px;
      color: rgba(255,255,255,0.2);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 4px;
    }
    .reasoning-text {
      font-size: 11px;
      color: rgba(255,255,255,0.55);
      line-height: 1.5;
      font-style: italic;
    }

    .threshold-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }
    .threshold-label { font-size: 11px; color: rgba(255,255,255,0.4); width: 60px; flex-shrink: 0; }
    input[type=range] {
      flex: 1;
      accent-color: #f97316;
      height: 4px;
    }
    .threshold-value { font-size: 10px; color: rgba(255,255,255,0.4); width: 20px; text-align: right; }

    .mock-btns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      margin-top: 12px;
    }
    .mock-btn {
      padding: 8px;
      border-radius: 8px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.6);
      font-size: 11px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .mock-btn:hover { background: rgba(255,255,255,0.12); }

    .reset-btn {
      width: 100%;
      margin-top: 12px;
      padding: 8px;
      border-radius: 8px;
      background: rgba(239,68,68,0.12);
      border: 1px solid rgba(239,68,68,0.25);
      color: rgba(239,68,68,0.7);
      font-size: 11px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .reset-btn:hover { background: rgba(239,68,68,0.22); }
  </style>
</head>
<body>
  <div class="header">
    <span class="title">Lava React</span>
    <div class="mock-toggle">
      <span>Mock</span>
      <button class="toggle" id="mock-toggle"></button>
    </div>
  </div>

  <div class="reasoning-box">
    <div class="reasoning-label">AI 正在看</div>
    <div class="reasoning-text" id="reasoning">等待分析</div>
  </div>

  <p class="section-title">情绪积累</p>
  <div class="bars" id="bars">
    <!-- 动态生成 -->
  </div>

  <div class="divider"></div>

  <p class="section-title">阈值调节</p>
  <div id="thresholds">
    <!-- 动态生成 -->
  </div>

  <div id="mock-section" style="display:none;">
    <div class="divider"></div>
    <p class="section-title">快速触发（Mock）</p>
    <div class="mock-btns" id="mock-btns">
      <!-- 动态生成 -->
    </div>
  </div>

  <div class="divider"></div>
  <button class="reset-btn" id="reset-btn">↺ 重置积累</button>

  <script src="popup.js"></script>
</body>
</html>
