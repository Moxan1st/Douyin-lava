name: Package Chrome Extension

on:
  push:
    branches: [main]

jobs:
  zip:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Zip lava-react into public/
        run: |
          cd lava-react
          zip -r ../public/lava-react.zip . \
            -x "*.DS_Store" \
            -x "__MACOSX/*"

      - name: Commit updated zip
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/lava-react.zip
          git diff --staged --quiet || (git commit -m "chore: update lava-react.zip [skip ci]" && git push)
